<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ - IoT Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen" style="background: linear-gradient(180deg, #ecfdf5 0%, #f0fdf4 30%, #ffffff 60%);">

  <!-- ヘッダー（ティール系） -->
  <header class="bg-white/80 backdrop-blur border-b border-teal-100 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
      <div class="flex items-center gap-6">
        <a href="/index.html" class="font-bold text-lg text-teal-700">&#x2709;&#xFE0F; IoT Portal</a>
        <nav class="flex gap-4 text-sm">
          <a href="/dashboard.html" class="text-gray-500 hover:text-gray-800">ダッシュボード</a>
          <a href="/devices.html" class="text-gray-500 hover:text-gray-800">デバイス管理</a>
          <a href="/firmware.html" class="text-gray-500 hover:text-gray-800">ファームウェア</a>
          <a href="/settings.html" class="text-gray-500 hover:text-gray-800">設定</a>
          <a href="/contact.html" class="text-teal-600 font-semibold border-b-2 border-teal-500 pb-0.5">お問い合わせ</a>
        </nav>
      </div>
      <a href="/login.html" class="text-sm text-gray-400 hover:text-gray-600">ログアウト</a>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-12">
    <div class="text-center mb-10">
      <h1 class="text-3xl font-bold text-gray-900">お問い合わせ</h1>
      <p class="text-gray-500 mt-2">ご質問・ご要望がございましたら、お気軽にお問い合わせください</p>
    </div>

    <div class="grid grid-cols-2 gap-10">
      <!-- フォーム -->
      <div class="bg-white rounded-2xl shadow-lg border border-gray-100 p-8">
        <h2 class="text-lg font-semibold text-gray-800 mb-6">お問い合わせフォーム</h2>
        <form action="#" method="POST" class="space-y-5">
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">お名前 <span class="text-red-500">*</span></label>
              <input type="text" placeholder="田中 太郎" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-400">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">会社名</label>
              <input type="text" placeholder="株式会社サンプル" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-400">
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">メールアドレス <span class="text-red-500">*</span></label>
            <input type="email" placeholder="tanaka@example.com" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-400">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">お問い合わせ種別</label>
            <select class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-400 bg-white">
              <option>製品に関するご質問</option>
              <option>デモのご依頼</option>
              <option>お見積り</option>
              <option>技術サポート</option>
              <option>パートナーシップ</option>
              <option>その他</option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">お問い合わせ内容 <span class="text-red-500">*</span></label>
            <textarea rows="5" placeholder="ご質問やご要望をお書きください..." class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-400 resize-none"></textarea>
          </div>

          <div class="flex items-start gap-2">
            <input type="checkbox" class="mt-1 rounded border-gray-300">
            <label class="text-xs text-gray-500"><a href="#" class="text-teal-600 underline">プライバシーポリシー</a>に同意の上、送信してください</label>
          </div>

          <button type="submit" class="w-full py-3 bg-teal-600 text-white rounded-lg font-medium hover:bg-teal-700 transition shadow-lg shadow-teal-200">送信する</button>
        </form>
      </div>

      <!-- 会社情報＋地図 -->
      <div class="space-y-6">
        <!-- 地図モック -->
        <div class="bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden">
          <div class="h-52 bg-gradient-to-br from-teal-100 to-blue-100 flex items-center justify-center relative">
            <div class="absolute inset-0 opacity-30" style="background-image: url('data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22400%22><rect fill=%22%23e0f2fe%22 width=%22400%22 height=%22400%22/><path d=%22M0 200 Q100 150 200 200 T400 200%22 stroke=%22%2399f6e4%22 fill=%22none%22 stroke-width=%222%22/><path d=%22M0 250 Q150 200 300 250 T400 200%22 stroke=%22%2267e8f9%22 fill=%22none%22 stroke-width=%221.5%22/><circle cx=%22200%22 cy=%22180%22 r=%225%22 fill=%22%230d9488%22/></svg>'); background-size: cover;"></div>
            <div class="relative">
              <div class="w-10 h-10 bg-teal-600 rounded-full flex items-center justify-center text-white text-lg shadow-lg">&#x1F4CD;</div>
              <div class="mt-2 bg-white px-3 py-1 rounded shadow text-xs font-medium text-gray-800">大手町ビルヂング 12F</div>
            </div>
          </div>
          <div class="p-5">
            <h3 class="font-semibold text-gray-800 mb-3">アクセス</h3>
            <p class="text-sm text-gray-600 leading-relaxed">
              〒100-0004<br>
              東京都千代田区大手町1-6-1<br>
              大手町ビルヂング 12F
            </p>
            <p class="text-sm text-gray-500 mt-2">東京メトロ 大手町駅 C7出口 徒歩1分</p>
          </div>
        </div>

        <!-- 連絡先カード -->
        <div class="bg-white rounded-2xl shadow-lg border border-gray-100 p-5">
          <h3 class="font-semibold text-gray-800 mb-4">その他の連絡方法</h3>
          <div class="space-y-3">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-lg bg-teal-50 flex items-center justify-center text-teal-600">&#x1F4DE;</div>
              <div>
                <p class="text-xs text-gray-500">電話</p>
                <p class="text-sm font-medium text-gray-800">03-6810-XXXX</p>
              </div>
            </div>
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-lg bg-teal-50 flex items-center justify-center text-teal-600">&#x2709;&#xFE0F;</div>
              <div>
                <p class="text-xs text-gray-500">メール</p>
                <p class="text-sm font-medium text-gray-800">info@3sec-demo.com</p>
              </div>
            </div>
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-lg bg-teal-50 flex items-center justify-center text-teal-600">&#x1F554;</div>
              <div>
                <p class="text-xs text-gray-500">営業時間</p>
                <p class="text-sm font-medium text-gray-800">平日 9:00 - 18:00</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

</body>
</html>

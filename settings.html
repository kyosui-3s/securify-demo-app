<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>設定 - IoT Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen">

  <!-- ヘッダー（グレートーン） -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
      <div class="flex items-center gap-6">
        <a href="/index.html" class="font-bold text-lg text-gray-700">&#x2699;&#xFE0F; IoT Portal</a>
        <nav class="flex gap-4 text-sm">
          <a href="/dashboard.html" class="text-gray-500 hover:text-gray-800">ダッシュボード</a>
          <a href="/devices.html" class="text-gray-500 hover:text-gray-800">デバイス管理</a>
          <a href="/firmware.html" class="text-gray-500 hover:text-gray-800">ファームウェア</a>
          <a href="/settings.html" class="text-gray-800 font-semibold border-b-2 border-gray-800 pb-0.5">設定</a>
          <a href="/contact.html" class="text-gray-500 hover:text-gray-800">お問い合わせ</a>
        </nav>
      </div>
      <a href="/login.html" class="text-sm text-gray-400 hover:text-gray-600">ログアウト</a>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-6 py-8">
    <h1 class="text-2xl font-bold text-gray-900 mb-2">設定</h1>
    <p class="text-gray-500 text-sm mb-8">システム設定とアカウント管理</p>

    <div class="grid grid-cols-4 gap-8">
      <!-- サイドメニュー -->
      <div class="col-span-1">
        <nav class="space-y-1">
          <a href="#" class="block px-4 py-2.5 rounded-lg bg-gray-800 text-white text-sm font-medium">一般設定</a>
          <a href="#" class="block px-4 py-2.5 rounded-lg text-gray-600 hover:bg-gray-200 text-sm">通知設定</a>
          <a href="#" class="block px-4 py-2.5 rounded-lg text-gray-600 hover:bg-gray-200 text-sm">セキュリティ</a>
          <a href="#" class="block px-4 py-2.5 rounded-lg text-gray-600 hover:bg-gray-200 text-sm">API キー</a>
          <a href="#" class="block px-4 py-2.5 rounded-lg text-gray-600 hover:bg-gray-200 text-sm">チーム管理</a>
          <a href="#" class="block px-4 py-2.5 rounded-lg text-gray-600 hover:bg-gray-200 text-sm">請求・プラン</a>
        </nav>
      </div>

      <!-- 設定フォーム -->
      <div class="col-span-3 space-y-6">
        <!-- 一般設定 -->
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6">
          <h2 class="font-semibold text-gray-800 mb-5">一般設定</h2>

          <div class="space-y-5">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1.5">組織名</label>
              <input type="text" value="3sec Technologies" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-gray-400">
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1.5">タイムゾーン</label>
              <select class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-gray-400 bg-white">
                <option selected>Asia/Tokyo (UTC+9)</option>
                <option>America/New_York (UTC-5)</option>
                <option>Europe/London (UTC+0)</option>
              </select>
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1.5">言語</label>
              <select class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-gray-400 bg-white">
                <option selected>日本語</option>
                <option>English</option>
                <option>中文</option>
              </select>
            </div>
          </div>
        </div>

        <!-- トグルスイッチ群 -->
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6">
          <h2 class="font-semibold text-gray-800 mb-5">通知・アラート設定</h2>

          <div class="space-y-4">
            <div class="flex items-center justify-between py-3 border-b border-gray-100">
              <div>
                <p class="text-sm font-medium text-gray-800">温度異常アラート</p>
                <p class="text-xs text-gray-500">閾値超過時にメール通知を送信</p>
              </div>
              <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" checked class="sr-only peer">
                <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-emerald-500"></div>
              </label>
            </div>

            <div class="flex items-center justify-between py-3 border-b border-gray-100">
              <div>
                <p class="text-sm font-medium text-gray-800">通信断アラート</p>
                <p class="text-xs text-gray-500">デバイスが5分以上通信しない場合に通知</p>
              </div>
              <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" checked class="sr-only peer">
                <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-emerald-500"></div>
              </label>
            </div>

            <div class="flex items-center justify-between py-3 border-b border-gray-100">
              <div>
                <p class="text-sm font-medium text-gray-800">FW配信完了通知</p>
                <p class="text-xs text-gray-500">ファームウェア配信完了時にSlack連携</p>
              </div>
              <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" class="sr-only peer">
                <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-emerald-500"></div>
              </label>
            </div>

            <div class="flex items-center justify-between py-3 border-b border-gray-100">
              <div>
                <p class="text-sm font-medium text-gray-800">日次レポート</p>
                <p class="text-xs text-gray-500">毎朝9:00にサマリーレポートをメール送信</p>
              </div>
              <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" checked class="sr-only peer">
                <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-emerald-500"></div>
              </label>
            </div>

            <div class="flex items-center justify-between py-3">
              <div>
                <p class="text-sm font-medium text-gray-800">セキュリティイベント</p>
                <p class="text-xs text-gray-500">不正アクセス検知時にPagerDuty連携</p>
              </div>
              <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" checked class="sr-only peer">
                <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-emerald-500"></div>
              </label>
            </div>
          </div>
        </div>

        <!-- 保存ボタン -->
        <div class="flex justify-end gap-3">
          <button class="px-5 py-2.5 border border-gray-300 rounded-lg text-sm text-gray-600 hover:bg-gray-50">キャンセル</button>
          <button class="px-5 py-2.5 bg-gray-800 text-white rounded-lg text-sm font-medium hover:bg-gray-700 transition">設定を保存</button>
        </div>
      </div>
    </div>
  </main>

</body>
</html>

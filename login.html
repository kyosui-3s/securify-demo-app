<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン - IoT Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center" style="background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);">

  <!-- 装飾的な背景パターン -->
  <div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(circle at 25% 25%, #3b82f6 1px, transparent 1px), radial-gradient(circle at 75% 75%, #3b82f6 1px, transparent 1px); background-size: 50px 50px;"></div>

  <div class="relative z-10 w-full max-w-md mx-4">
    <!-- ロゴ -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-blue-600 mb-4">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white">IoT Device Portal</h1>
      <p class="text-blue-300 mt-1 text-sm">Smart Factory Management System</p>
    </div>

    <!-- ログインカード -->
    <div class="bg-white/10 backdrop-blur-lg rounded-2xl p-8 border border-white/20 shadow-2xl">
      <h2 class="text-xl font-semibold text-white mb-6">アカウントにログイン</h2>

      <form id="loginForm" onsubmit="return handleLogin(event)">
        <!-- 代理店コード（自動巡回で突破不可能） -->
        <div class="mb-5">
          <label class="block text-blue-200 text-sm font-medium mb-2">代理店コード <span class="text-red-400">*</span></label>
          <input type="text" id="dealerCode" name="dealer_code" placeholder="例: DLR-XXXX" required
                 class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white placeholder-blue-300/50 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400 transition">
          <p class="text-blue-400/60 text-xs mt-1.5">契約時に発行された代理店コードを入力してください</p>
        </div>

        <!-- デバイス台数（特定の範囲の数値が必要） -->
        <div class="mb-5">
          <label class="block text-blue-200 text-sm font-medium mb-2">管理デバイス台数 <span class="text-red-400">*</span></label>
          <input type="number" id="deviceCount" name="device_count" placeholder="1〜9999" min="1" max="9999" required
                 class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white placeholder-blue-300/50 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400 transition">
          <p class="text-blue-400/60 text-xs mt-1.5">ご契約プランのデバイス上限数を入力（1〜9999台）</p>
        </div>

        <div class="mb-5">
          <label class="block text-blue-200 text-sm font-medium mb-2">メールアドレス</label>
          <input type="email" name="email" placeholder="admin@3sec-demo.com"
                 class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white placeholder-blue-300/50 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400 transition">
        </div>

        <div class="mb-6">
          <label class="block text-blue-200 text-sm font-medium mb-2">パスワード</label>
          <input type="password" name="password" placeholder="••••••••"
                 class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white placeholder-blue-300/50 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400 transition">
        </div>

        <!-- エラーメッセージ -->
        <div id="errorMsg" class="hidden mb-4 p-3 rounded-lg bg-red-500/20 border border-red-500/30 text-red-300 text-sm"></div>

        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 rounded-lg text-center transition transform hover:scale-[1.02]">
          ログイン
        </button>
      </form>

      <div class="mt-6 pt-6 border-t border-white/10 text-center">
        <p class="text-blue-300 text-sm">SSO でログイン</p>
        <div class="flex justify-center gap-3 mt-3">
          <button class="px-4 py-2 rounded-lg bg-white/10 border border-white/20 text-white text-sm hover:bg-white/20 transition">Google</button>
          <button class="px-4 py-2 rounded-lg bg-white/10 border border-white/20 text-white text-sm hover:bg-white/20 transition">Microsoft</button>
          <button class="px-4 py-2 rounded-lg bg-white/10 border border-white/20 text-white text-sm hover:bg-white/20 transition">SAML</button>
        </div>
      </div>
    </div>

    <p class="text-center text-blue-400/60 text-xs mt-6">&copy; 2025 3sec Technologies, Inc.</p>
  </div>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      var code = document.getElementById('dealerCode').value.trim();
      var count = parseInt(document.getElementById('deviceCount').value, 10);
      var errorMsg = document.getElementById('errorMsg');

      // 代理店コード: DLR- で始まる特定のパターンが必要
      if (!/^DLR-\d{4}$/.test(code)) {
        errorMsg.textContent = '代理店コードの形式が正しくありません（DLR-XXXX 形式で入力してください）';
        errorMsg.classList.remove('hidden');
        return false;
      }

      // デバイス台数: 1〜9999 の範囲
      if (isNaN(count) || count < 1 || count > 9999) {
        errorMsg.textContent = '管理デバイス台数は1〜9999の範囲で入力してください';
        errorMsg.classList.remove('hidden');
        return false;
      }

      // バリデーション通過 → ダッシュボードへ遷移
      window.location.href = '/dashboard.html';
      return false;
    }
  </script>

</body>
</html>
